<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Outfit', system-ui, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1B3A28"/>

  <!-- Subtle grid dots -->
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <radialGradient id="glow1" cx="75%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F5C518" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F5C518" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="4" height="230" rx="2" fill="#F5C518" opacity="0.6"/>

  <!-- Logo mark — yellow pin -->
  <ellipse cx="148" cy="215" rx="44" ry="44" fill="#F5C518"/>
  <!-- Moped simplified inside pin -->
  <rect x="130" y="204" width="11" height="9" rx="1.5" fill="#1B3A28"/>
  <path d="M141,207 L148,205 L154,211 L141,213 Z" fill="#1B3A28"/>
  <circle cx="136" cy="220" r="5" fill="none" stroke="#1B3A28" stroke-width="2.2"/>
  <circle cx="154" cy="220" r="5" fill="none" stroke="#1B3A28" stroke-width="2.2"/>
  <path d="M136,215 L154,215" stroke="#1B3A28" stroke-width="1.5"/>

  <!-- Brand name -->
  <text x="210" y="232" font-size="88" font-weight="900" fill="white" letter-spacing="-3">Gladoš</text>

  <!-- Tagline -->
  <text x="100" y="310" font-size="32" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">Dostava hrane u Vrbovcu</text>

  <!-- Divider -->
  <rect x="100" y="348" width="120" height="3" rx="1.5" fill="#F5C518" opacity="0.7"/>

  <!-- Value props -->
  <g font-size="24" font-weight="600" fill="rgba(255,255,255,0.70)">
    <!-- Dot 1 -->
    <circle cx="107" cy="400" r="5" fill="#F5C518"/>
    <text x="126" y="408">15–30 min dostava</text>

    <!-- Dot 2 -->
    <circle cx="107" cy="448" r="5" fill="#F5C518"/>
    <text x="126" y="456">Plaćanje gotovinom</text>

    <!-- Dot 3 -->
    <circle cx="107" cy="496" r="5" fill="#F5C518"/>
    <text x="126" y="504">Lokalni restorani</text>
  </g>

  <!-- Right: CTA pill -->
  <rect x="820" y="240" width="300" height="72" rx="36" fill="#F5C518"/>
  <text x="970" y="285" font-size="26" font-weight="800" fill="#1B3A28" text-anchor="middle" letter-spacing="-0.5">Naruči odmah →</text>

  <!-- URL -->
  <text x="970" y="360" font-size="22" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle">glados.hr</text>

  <!-- Bottom border accent -->
  <rect x="0" y="614" width="1200" height="16" rx="0" fill="#F5C518" opacity="0.15"/>
  <rect x="0" y="620" width="1200" height="10" rx="0" fill="#F5C518" opacity="0.25"/>
</svg>
