<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Speed lines (left) -->
  <rect x="1"  y="20" width="9"  height="3.5" rx="1.75" fill="#FF7A00"/>
  <rect x="1"  y="27" width="13" height="3.5" rx="1.75" fill="#FF7A00"/>
  <rect x="1"  y="34" width="9"  height="3.5" rx="1.75" fill="#FF7A00"/>

  <!-- Dome (black half-ellipse) — sits on tray -->
  <path d="M18,32 C18,15 52,15 52,32Z" fill="#121212"/>
  <!-- Knob -->
  <rect x="33" y="10" width="4" height="7" rx="2" fill="#121212"/>
  <circle cx="35" cy="10" r="3.5" fill="#121212"/>

  <!-- Tray rim (orange bar) -->
  <rect x="16" y="30" width="38" height="5.5" rx="2.75" fill="#FF7A00"/>

  <!-- G arc body (orange filled ring, open at upper-right ~45 deg)
       Circle center (35, 46), outer r=14, inner r=7
       Outer start upper-right: (45, 36), Outer end right: (49, 46)
       Inner right: (42, 46), Inner upper-right: (40, 41) -->
  <path d="M45,36 A14,14 0 1,1 49,46 L42,46 A7,7 0 1,0 40,41 Z" fill="#FF7A00"/>
</svg>
